{% extends 'base_private.html' %}

{% block content %}
<div class="story-container">
    <div class="chapter-header">
        <h2>📜 Глава {{ chapter }}: {{ chapter_data.name }}</h2>
    </div>

    <div class="chapter-text">
        «{{ chapter_data.text_before }}»
    </div>

    <div class="enemy-card">
        <div class="enemy-info">
            <div class="enemy-name">👹 {{ battle.enemy }}</div>
            <div class="health-bar-container">
                <div class="health-bar-fill"
                    style="width: {{ (battle.health / battle.max_health * 100) if battle.max_health else 100 }}%;">
                </div>
            </div>
            <div>❤️ Здоровье врага: {{ battle.health }}</div>
        </div>
    </div>

    <div class="player-health">
        ❤️ Ваше здоровье: {{ current_user.health }}
    </div>

    <div class="battle-actions" style="display: flex; justify-content: center; gap: 20px;">
        <a href="/story/battle" class="btn battle-btn">⚔️ Начать бой</a>
        <a href="/dashboard" class="btn battle-btn">🏠 Выход</a>
    </div>
</div>
{% endblock %}
